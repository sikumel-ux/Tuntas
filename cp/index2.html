<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TUNTAS - Admin Panel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght=300;400;500;600;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="gaya.css">
</head>
<body class="bg-[#f8fafc] min-h-screen pb-24 select-none">

    <header class="sticky top-0 z-40 bg-white border-b border-slate-100 px-4 py-3 flex items-center justify-between shd-b">
        <div class="flex items-center gap-2">
            <img src="logo.png" alt="Logo Tuntas" class="h-8 w-auto object-contain">
            <span class="text-xl font-bold text-[#045936]">Tuntas.</span>
        </div>
        
        <div class="flex items-center gap-4">
            <button onclick="loadDataDariSheets()" class="text-slate-500 hover:text-[#045936] p-2" title="Reload Data">
                <i class="fa-solid fa-arrow-rotate-right text-lg"></i>
            </button>
            <button onclick="logoutAdmin()" class="text-slate-500 hover:text-red-600 p-2" title="Keluar">
                <i class="fa-solid fa-right-from-bracket text-lg"></i>
            </button>
        </div>
    </header>

    <div id="loading" class="fixed inset-0 z-50 bg-white/90 backdrop-blur-sm flex flex-col items-center justify-center gap-4">
        <div class="w-12 h-12 border-4 border-slate-200 border-t-[#045936] rounded-full animate-spin"></div>
        <p class="text-xs text-slate-500 font-medium tracking-wider uppercase">Memuat Data...</p>
    </div>

    <main class="max-w-md mx-auto p-4 space-y-4">

        <div id="tab-kas" class="tab-content space-y-4">
            <div class="bg-[#045936] text-white rounded-[2rem] p-6 space-y-4 shadow-lg shadow-[#045936]/10">
                <div>
                    <p class="text-[10px] font-bold text-emerald-200 uppercase tracking-wider">Total Saldo Kas</p>
                    <p id="vTotalKas" class="text-3xl font-bold mt-1">Rp 0</p>
                </div>
                <div class="border-t border-white/10 pt-3 flex justify-between items-center">
                    <p class="text-xs text-emerald-100">Total Warga Terdaftar:</p>
                    <p id="vTotalWarga" class="text-sm font-bold">0 Warga</p>
                </div>
            </div>
            
            <div class="bg-white rounded-2xl p-4 space-y-3 border border-slate-100 shadow-sm">
                <div class="flex justify-between items-center border-b border-slate-100 pb-2">
                    <h3 class="text-xs font-bold uppercase tracking-wider text-slate-500"><i class="fa-solidxl fa-money-bill-transfer mr-1.5 text-[#045936]"></i>Histori Transaksi</h3>
                    <button class="text-[10px] font-bold text-[#045936] uppercase">Semua</button>
                </div>
                <div id="listKas" class="space-y-2 max-h-[300px] overflow-y-auto pr-1"></div>
            </div>
        </div>

        <div id="tab-warga" class="tab-content space-y-4" style="display: none;">
            <div class="bg-white rounded-2xl p-3 flex items-center gap-2 border border-slate-100 shadow-sm">
                <i class="fa-solid fa-magnifying-glass text-slate-400 ml-1"></i>
                <input type="text" id="cariWarga" placeholder="Cari nama warga..." class="bg-transparent text-sm w-full focus:outline-none uppercase font-medium text-slate-800">
            </div>
            <div id="listWarga" class="space-y-2 max-h-[450px] overflow-y-auto pr-1"></div>
        </div>

        <div id="tab-bayar" class="tab-content bg-white rounded-2xl p-5 space-y-4 border border-slate-100 shadow-sm" style="display: none;">
            <div class="border-b border-slate-100 pb-2">
                <h2 class="text-sm font-bold uppercase tracking-wider text-slate-700"><i class="fa-solid fa-receipt mr-2 text-[#045936]"></i>Input Iuran Warga</h2>
            </div>
            
            <div class="space-y-3">
                <div class="space-y-1">
                    <label class="text-[10px] font-bold text-slate-400 uppercase px-1">Tanggal</label>
                    <input type="date" id="iTgl" class="modern-in font-medium">
                </div>
                
                <div class="space-y-1">
                    <label class="text-[10px] font-bold text-slate-400 uppercase px-1">Nama Warga</label>
                    <select id="iNama" class="modern-in font-bold uppercase"></select>
                </div>

                <div class="space-y-1">
                    <label class="text-[10px] font-bold text-slate-400 uppercase px-1">Nominal (Rp)</label>
                    <input type="number" id="iNom" placeholder="Contoh: 20000" class="modern-in font-bold">
                </div>

                <button onclick="simpanIuran()" class="w-full bg-[#045936] hover:bg-[#034429] text-white font-bold py-3.5 px-4 rounded-xl text-sm transition-all shadow-md shadow-[#045936]/20 uppercase tracking-wider mt-2">
                    <i class="fa-solid fa-floppy-disk mr-2"></i>Simpan Pembayaran
                </button>
            </div>
        </div>

        <div id="tab-trash" class="tab-content space-y-4" style="display: none;">
            <div class="bg-white rounded-2xl p-4 space-y-3 border border-slate-100 shadow-sm">
                <div class="flex justify-between items-center border-b border-slate-100 pb-2">
                    <h3 class="text-xs font-bold uppercase tracking-wider text-slate-500"><i class="fa-solid fa-trash-can mr-1.5 text-red-600"></i>Log Angkutan Sampah</h3>
                </div>
                <div id="listSampah" class="space-y-2 max-h-[420px] overflow-y-auto pr-1"></div>
            </div>
        </div>

    </main>

    <nav class="fixed bottom-0 left-0 right-0 bg-white border-t border-slate-100 px-2 py-2 shd-b z-40">
        <div class="max-w-md mx-auto grid grid-cols-4 gap-1">
            <button onclick="bukaTab('kas')" id="nav-kas" class="nav-btn active flex flex-col items-center gap-1 py-2 rounded-xl">
                <i class="fa-solid fa-house text-base"></i>
                <span class="text-[10px] font-medium uppercase tracking-wider">Home</span>
            </button>
            <button onclick="bukaTab('warga')" id="nav-warga" class="nav-btn flex flex-col items-center gap-1 py-2 rounded-xl">
                <i class="fa-solid fa-users text-base"></i>
                <span class="text-[10px] font-medium uppercase tracking-wider">Warga</span>
            </button>
            <button onclick="bukaTab('bayar')" id="nav-bayar" class="nav-btn flex flex-col items-center gap-1 py-2 rounded-xl">
                <i class="fa-solid fa-money-check-dollar text-base"></i>
                <span class="text-[10px] font-medium uppercase tracking-wider">Bayar</span>
            </button>
            <button onclick="bukaTab('trash')" id="nav-trash" class="nav-btn flex flex-col items-center gap-1 py-2 rounded-xl">
                <i class="fa-solid fa-trash text-base"></i>
                <span class="text-[10px] font-medium uppercase tracking-wider">Sampah</span>
            </button>
        </div>
    </nav>

</body>
  </html>

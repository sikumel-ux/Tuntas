<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TUNTAS - Admin RT 04</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" />
    <style>
        body { font-family: sans-serif; -webkit-tap-highlight-color: transparent; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .nav-btn.active { color: #064e3b; }
    </style>
</head>
<body class="bg-slate-50 pb-20">

<!-- MAIN CONTENT AREA -->
<div id="tab-warga" class="tab-content active p-4">
    <h2 class="text-sm font-black text-slate-800 uppercase mb-4">Manajemen Warga</h2>
    <div id="wargaContainer" class="space-y-3"></div>
    <button onclick="openModal('mTambahWarga')" class="fixed bottom-20 right-6 bg-emerald-900 text-white w-14 h-14 rounded-full shadow-lg flex items-center justify-center text-xl">
        <i class="fa-solid fa-plus"></i>
    </button>
</div>

<div id="tab-sampah" class="tab-content p-4">
    <h2 class="text-sm font-black text-slate-800 uppercase mb-4">Setor Sampah</h2>
    <form id="formSampah" class="bg-white p-4 rounded-2xl shadow-sm border space-y-3">
        <select id="setorWargaKey" class="w-full p-3 bg-slate-50 rounded-xl text-xs font-bold border"></select>
        <div class="grid grid-cols-3 gap-2">
            <input type="number" id="setorO" placeholder="Org (Kg)" class="p-3 bg-slate-50 rounded-xl text-xs border">
            <input type="number" id="setorA" placeholder="Anorg (Kg)" class="p-3 bg-slate-50 rounded-xl text-xs border">
            <input type="number" id="setorR" placeholder="Residu (Kg)" class="p-3 bg-slate-50 rounded-xl text-xs border">
        </div>
        <button type="submit" class="w-full bg-emerald-800 text-white py-3 rounded-xl text-xs font-bold">Simpan Timbangan</button>
    </form>
</div>

<div id="tab-kas" class="tab-content p-4">
    <h2 class="text-sm font-black text-slate-800 uppercase mb-4">Keuangan RT</h2>
    <form id="formKas" class="bg-white p-4 rounded-2xl shadow-sm border space-y-3">
        <select id="kasJenis" class="w-full p-3 bg-slate-50 rounded-xl text-xs border">
            <option value="masuk">Uang Masuk</option>
            <option value="keluar">Uang Keluar</option>
        </select>
        <input type="number" id="kasNominal" placeholder="Nominal (Rp)" class="w-full p-3 bg-slate-50 rounded-xl text-xs border">
        <input type="text" id="kasKet" placeholder="Keterangan" class="w-full p-3 bg-slate-50 rounded-xl text-xs border">
        <button type="submit" class="w-full bg-emerald-800 text-white py-3 rounded-xl text-xs font-bold">Simpan Kas</button>
    </form>
</div>

<div id="tab-info" class="tab-content p-4">
    <h2 class="text-sm font-black text-slate-800 uppercase mb-4">Pengumuman</h2>
    <form id="formInfo" class="bg-white p-4 rounded-2xl shadow-sm border space-y-3">
        <input type="text" id="infoJudul" placeholder="Judul" class="w-full p-3 bg-slate-50 rounded-xl text-xs border">
        <textarea id="infoIsi" placeholder="Isi Pengumuman" class="w-full p-3 bg-slate-50 rounded-xl text-xs border"></textarea>
        <button type="submit" class="w-full bg-emerald-800 text-white py-3 rounded-xl text-xs font-bold">Kirim Info</button>
    </form>
</div>

<!-- BOTTOM NAVIGATION -->
<nav class="fixed bottom-0 left-0 right-0 bg-white border-t p-3 flex justify-around shadow-lg z-50">
    <button onclick="switchTab('tab-warga')" class="nav-btn active flex flex-col items-center text-slate-400 text-[10px] font-black"><i class="fa-solid fa-users text-lg"></i> WARGA</button>
    <button onclick="switchTab('tab-sampah')" class="nav-btn flex flex-col items-center text-slate-400 text-[10px] font-black"><i class="fa-solid fa-trash-can text-lg"></i> SAMPAH</button>
    <button onclick="switchTab('tab-kas')" class="nav-btn flex flex-col items-center text-slate-400 text-[10px] font-black"><i class="fa-solid fa-wallet text-lg"></i> KAS</button>
    <button onclick="switchTab('tab-info')" class="nav-btn flex flex-col items-center text-slate-400 text-[10px] font-black"><i class="fa-solid fa-bullhorn text-lg"></i> INFO</button>
</nav>

<!-- MODAL TAMBAH -->
<div id="mTambahWarga" class="hidden fixed inset-0 bg-black/50 z-[60] flex items-center justify-center p-4">
    <div class="bg-white w-full max-w-sm p-6 rounded-3xl">
        <h3 class="font-black text-emerald-900 mb-4">Tambah Warga</h3>
        <form id="formTambahWarga" class="space-y-3">
            <input type="text" id="addNama" placeholder="Nama" class="w-full p-3 bg-slate-50 rounded-xl text-xs border">
            <input type="text" id="addUser" placeholder="Username" class="w-full p-3 bg-slate-50 rounded-xl text-xs border">
            <input type="text" id="addPass" placeholder="Password" class="w-full p-3 bg-slate-50 rounded-xl text-xs border">
            <button type="submit" class="w-full bg-emerald-900 text-white py-3 rounded-xl text-xs font-black">SIMPAN</button>
        </form>
    </div>
</div>

<script>
    const DB_URL = "https://tuntas-04-default-rtdb.asia-southeast1.firebasedatabase.app";

    function switchTab(id) {
        document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
        document.querySelectorAll('.nav-btn').forEach(el => el.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        event.currentTarget.classList.add('active');
    }

    function openModal(id) { document.getElementById(id).classList.remove('hidden'); }
    
    // Logic untuk fetch dan save (Tetap sama seperti struktur data kamu sebelumnya)
    // ... [Tambahkan logic fetch/POST ke Firebase di sini sesuai kebutuhan]
</script>
</body>
</html>
